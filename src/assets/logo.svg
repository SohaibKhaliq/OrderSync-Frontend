<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="110" cy="110" r="105" fill="white" stroke="#1a3a6b" stroke-width="6"/>
  <circle cx="110" cy="110" r="94" fill="none" stroke="#c8102e" stroke-width="3"/>

  <!-- Curved text path top -->
  <defs>
    <path id="topArc" d="M 22,110 A 88,88 0 0,1 198,110"/>
    <path id="bottomArc" d="M 30,130 A 88,88 0 0,0 190,130"/>
  </defs>
  <text font-family="serif" font-size="13" font-weight="bold" fill="#1a3a6b" letter-spacing="2">
    <textPath href="#topArc" startOffset="5%">University of Central Punjab</textPath>
  </text>
  <text font-family="serif" font-size="11" font-weight="600" fill="#1a3a6b" letter-spacing="1">
    <textPath href="#bottomArc" startOffset="18%">Lahore, Pakistan  ·  Est. 2002</textPath>
  </text>

  <!-- Central diamond / book shape -->
  <polygon points="110,45 140,80 110,95 80,80" fill="#1a3a6b"/>
  <polygon points="110,95 140,80 110,115 80,80" fill="#3a6abf" opacity="0.85"/>
  <polygon points="110,45 140,80 110,80" fill="#2a509f"/>
  <polygon points="110,45 80,80 110,80" fill="#1a3a6b"/>

  <!-- UCP text -->
  <text x="110" y="148" font-family="sans-serif" font-weight="900" font-size="22" fill="#c8102e" text-anchor="middle" letter-spacing="4">UCP</text>

  <!-- Small divider lines -->
  <line x1="62" y1="155" x2="88" y2="155" stroke="#1a3a6b" stroke-width="1.5"/>
  <line x1="132" y1="155" x2="158" y2="155" stroke="#1a3a6b" stroke-width="1.5"/>
</svg>
